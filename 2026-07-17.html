<div id="toast" class="toast"></div>
<script>
(function(){
  var KEY = 'dailyh…hts_' + '2026-07-17';
  function load() { try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e) { return {}; } }
  function save(thoughts) { localStorage.setItem(KEY, JSON.stringify(thoughts)); }
  function restore() {
    var thoughts = load();
    for (var idx in thoughts) {
      var input = document.getElementById('ti-' + idx);
      var btn = document.getElementById('ts-' + idx);
      if (input && thoughts[idx]) {
        input.value = thoughts[idx];
        if (btn) { btn.textContent = '✓'; btn.classList.add('saved'); }
      }
    }
  }
  var timer = null;
  function showToast(msg) {
    var t = document.getElementById('toast');
    if (!t) return;
    t.textContent = msg;
    t.className = 'toast show';
    if (timer) clearTimeout(timer);
    timer = setTimeout(function() { t.className = 'toast hide'; }, 1500);
  }
  function ready(fn) {
    if (document.readyState !== 'loading') { fn(); }
    else { document.addEventListener('DOMContentLoaded', fn); }
  }
  ready(function() {
    restore();
    var btns = document.querySelectorAll('.btn-thought-save');
    for (var i = 0; i < btns.length; i++) {
      (function(btn) {
        btn.addEventListener('click', function() {
          var idx = btn.id.replace('ts-', '');
          var input = document.getElementById('ti-' + idx);
          if (!input) return;
          var feeling = (input.value || '').trim();
          if (!feeling) { input.focus(); return; }
          var thoughts = load();
          thoughts[idx] = feeling;
          save(thoughts);
          try {
            navigator.sendBeacon('https://thoughts-sync.luo-yi07.workers.dev/save', JSON.stringify({
              date: '2026-07-17',
              title: input.dataset.title || '',
              feeling: feeling
            }));
          } catch(e) {}
          btn.textContent = '✓';
          btn.classList.add('saved');
          showToast('已储存');
        });
      })(btns[i]);
    }

  });
})();
</script>
